services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATA_DIR: /data
      DATABASE_URL: sqlite:////data/app.db
      CORS_ORIGINS: http://localhost:${WEB_PORT:-3000},http://127.0.0.1:${WEB_PORT:-3000}
      MAX_CLIP_DURATION_SECONDS: ${MAX_CLIP_DURATION_SECONDS:-1800}
      DOWNLOAD_MARGIN_SECONDS: ${DOWNLOAD_MARGIN_SECONDS:-5}
      FFMPEG_PATH: ffmpeg
      FFPROBE_PATH: ffprobe
      YTDLP_PATH: yt-dlp
      VIDEO_CRF: ${VIDEO_CRF:-22}
      VIDEO_PRESET: ${VIDEO_PRESET:-fast}
      SILENCE_MIN_SECONDS: ${SILENCE_MIN_SECONDS:-1.2}
      SILENCE_REMOVE_AFTER_SECONDS: ${SILENCE_REMOVE_AFTER_SECONDS:-2.5}
      SILENCE_PADDING_SECONDS: ${SILENCE_PADDING_SECONDS:-0.2}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-auto}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-auto}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-auto}
      VOD_ANALYSIS_FIXTURE_MODE: ${VOD_ANALYSIS_FIXTURE_MODE:-false}
      VOD_ANALYSIS_PIPELINE_VERSION: ${VOD_ANALYSIS_PIPELINE_VERSION:-vod-analysis-v2-coarse.1}
      VOD_ANALYSIS_PHASE_PIPELINE_VERSION: ${VOD_ANALYSIS_PHASE_PIPELINE_VERSION:-vod-analysis-profile-layout.2}
      VOD_ANALYSIS_MINIMUM_CANDIDATE_SCORE: ${VOD_ANALYSIS_MINIMUM_CANDIDATE_SCORE:-55}
      VOD_ANALYSIS_DEBUG: ${VOD_ANALYSIS_DEBUG:-false}
      VALIDATION_DEBUG: ${VALIDATION_DEBUG:-false}
      LAYOUT_SAMPLE_SECONDS: ${LAYOUT_SAMPLE_SECONDS:-2}
      LAYOUT_TRANSITION_CONFIRMATION: ${LAYOUT_TRANSITION_CONFIRMATION:-3}
      VISUAL_LAYOUT_PROFILE_PATH: /data/profiles/illojuan_visual.json
      VOD_ANALYSIS_WINDOW_SECONDS: ${VOD_ANALYSIS_WINDOW_SECONDS:-30}
      VOD_ANALYSIS_AUDIO_SAMPLE_SECONDS: ${VOD_ANALYSIS_AUDIO_SAMPLE_SECONDS:-10}
      VOD_ANALYSIS_VISUAL_SAMPLES_PER_WINDOW: ${VOD_ANALYSIS_VISUAL_SAMPLES_PER_WINDOW:-2}
      VOD_ANALYSIS_FETCH_BLOCK_SECONDS: ${VOD_ANALYSIS_FETCH_BLOCK_SECONDS:-900}
      VOD_ANALYSIS_MAX_SECONDS: ${VOD_ANALYSIS_MAX_SECONDS:-10800}
      VOD_ANALYSIS_PROBE_MODEL: ${VOD_ANALYSIS_PROBE_MODEL:-tiny}
      VOD_ANALYSIS_PROBE_VOICE_RATIO: ${VOD_ANALYSIS_PROBE_VOICE_RATIO:-0.20}
      VOD_ANALYSIS_PROBE_MIN_SPEECH_SECONDS: ${VOD_ANALYSIS_PROBE_MIN_SPEECH_SECONDS:-2.0}
      VOD_ANALYSIS_SAMPLE_TIMEOUT_SECONDS: ${VOD_ANALYSIS_SAMPLE_TIMEOUT_SECONDS:-90}
      VOD_TOPIC_ANALYSIS_PIPELINE_VERSION: ${VOD_TOPIC_ANALYSIS_PIPELINE_VERSION:-vod-topic-analysis-v1.1-grounded}
      VOD_TOPIC_ANALYSIS_MAX_SECONDS: ${VOD_TOPIC_ANALYSIS_MAX_SECONDS:-7200}
      WHISPER_ANALYSIS_MODEL: ${WHISPER_ANALYSIS_MODEL:-medium}
      TRANSCRIPTION_CHUNK_SECONDS: ${TRANSCRIPTION_CHUNK_SECONDS:-1800}
      TRANSCRIPTION_OVERLAP_SECONDS: ${TRANSCRIPTION_OVERLAP_SECONDS:-15}
      VOD_TOPIC_AUDIO_TIMEOUT_SECONDS: ${VOD_TOPIC_AUDIO_TIMEOUT_SECONDS:-900}
      SEMANTIC_EMBEDDING_MODEL: ${SEMANTIC_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      SEMANTIC_WINDOW_MIN_SECONDS: ${SEMANTIC_WINDOW_MIN_SECONDS:-30}
      SEMANTIC_WINDOW_TARGET_SECONDS: ${SEMANTIC_WINDOW_TARGET_SECONDS:-60}
      SEMANTIC_WINDOW_MAX_SECONDS: ${SEMANTIC_WINDOW_MAX_SECONDS:-90}
      TOPIC_MIN_SECONDS: ${TOPIC_MIN_SECONDS:-300}
      TOPIC_TARGET_SECONDS: ${TOPIC_TARGET_SECONDS:-720}
      TOPIC_MAX_SECONDS: ${TOPIC_MAX_SECONDS:-1500}
      CANDIDATE_MIN_SECONDS: ${CANDIDATE_MIN_SECONDS:-300}
      CANDIDATE_TARGET_MIN_SECONDS: ${CANDIDATE_TARGET_MIN_SECONDS:-480}
      CANDIDATE_TARGET_MAX_SECONDS: ${CANDIDATE_TARGET_MAX_SECONDS:-900}
      CANDIDATE_MAX_SECONDS: ${CANDIDATE_MAX_SECONDS:-1200}
      CANDIDATE_CONTEXT_MARGIN_SECONDS: ${CANDIDATE_CONTEXT_MARGIN_SECONDS:-5}
      VOD_TOPIC_MAX_CANDIDATES: ${VOD_TOPIC_MAX_CANDIDATES:-10}
      SMART_VERTICAL_LAYOUT_DEFAULT: ${SMART_VERTICAL_LAYOUT_DEFAULT:-true}
      SCENE_DETECTION_ENABLED: ${SCENE_DETECTION_ENABLED:-true}
      SCENE_CHANGE_THRESHOLD: ${SCENE_CHANGE_THRESHOLD:-0.08}
      SCENE_MIN_DURATION_SECONDS: ${SCENE_MIN_DURATION_SECONDS:-1.5}
      SCENE_SAMPLE_FPS: ${SCENE_SAMPLE_FPS:-2}
      FACE_DETECTION_SAMPLE_FPS: ${FACE_DETECTION_SAMPLE_FPS:-2}
      FACE_ANALYSIS_MAX_WIDTH: ${FACE_ANALYSIS_MAX_WIDTH:-1280}
      FACE_DETECTOR_MODEL_PATH: /opt/models/face_detection/face_detection_yunet_2023mar.onnx
      FACE_DETECTOR_SCORE_THRESHOLD: ${FACE_DETECTOR_SCORE_THRESHOLD:-0.55}
      FACE_DETECTOR_PROFILE_THRESHOLD: ${FACE_DETECTOR_PROFILE_THRESHOLD:-0.40}
      FACE_DETECTOR_NMS_THRESHOLD: ${FACE_DETECTOR_NMS_THRESHOLD:-0.30}
      FACE_DETECTOR_TOP_K: ${FACE_DETECTOR_TOP_K:-5000}
      FACE_DETECTOR_HAAR_FALLBACK: ${FACE_DETECTOR_HAAR_FALLBACK:-true}
      FACE_LAYOUT_MIN_CONFIDENCE: ${FACE_LAYOUT_MIN_CONFIDENCE:-0.60}
      FULLSCREEN_FACE_AREA_THRESHOLD: ${FULLSCREEN_FACE_AREA_THRESHOLD:-0.025}
      FACECAM_MAX_FACE_AREA_THRESHOLD: ${FACECAM_MAX_FACE_AREA_THRESHOLD:-0.06}
      FACE_STABILITY_POSITION_TOLERANCE: ${FACE_STABILITY_POSITION_TOLERANCE:-0.04}
      FACE_STABILITY_SIZE_TOLERANCE: ${FACE_STABILITY_SIZE_TOLERANCE:-0.20}
      LAYOUT_MIN_SEGMENT_SECONDS: ${LAYOUT_MIN_SEGMENT_SECONDS:-1.5}
      LAYOUT_MERGE_IOU_THRESHOLD: ${LAYOUT_MERGE_IOU_THRESHOLD:-0.70}
      LAYOUT_MERGE_CENTER_DISTANCE_RATIO: ${LAYOUT_MERGE_CENTER_DISTANCE_RATIO:-0.05}
      FACEBOX_EXPAND_LEFT: ${FACEBOX_EXPAND_LEFT:-0.80}
      FACEBOX_EXPAND_RIGHT: ${FACEBOX_EXPAND_RIGHT:-0.80}
      FACEBOX_EXPAND_TOP: ${FACEBOX_EXPAND_TOP:-0.55}
      FACEBOX_EXPAND_BOTTOM: ${FACEBOX_EXPAND_BOTTOM:-1.60}
      VERTICAL_FACECAM_HEIGHT_RATIO: ${VERTICAL_FACECAM_HEIGHT_RATIO:-0.38}
      VERTICAL_OUTPUT_WIDTH: ${VERTICAL_OUTPUT_WIDTH:-1080}
      VERTICAL_OUTPUT_HEIGHT: ${VERTICAL_OUTPUT_HEIGHT:-1920}
      VERTICAL_DIVIDER_HEIGHT: ${VERTICAL_DIVIDER_HEIGHT:-4}
      SMART_LAYOUT_DEBUG: ${SMART_LAYOUT_DEBUG:-false}
      YOUTUBE_CLIENT_SECRETS_PATH: /data/credentials/client_secret.json
      YOUTUBE_TOKEN_PATH: /data/credentials/token.json
      TWITCH_COOKIES_PATH: /data/credentials/twitch_cookies.txt
      DEMO_MODE: ${DEMO_MODE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${API_PORT:-8000}:8000"
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
